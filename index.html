<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conscientização sobre Bullying e Cyberbullying — Escola Erundina Negreiros — GRE Recife Norte</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="stage">
    <header>
      <div class="brand-group">
        <div class="title-wrap">
          <h1>CONSCIENTIZAÇÃO SOBRE BULLYING E CYBERBULLYING</h1>
          <p>Escola Erundina Negreiros — GRE Recife Norte</p>
          <p>Profª. Ana Karla | Profº. Valdeck Francisco</p>
          <p>GRE Recife Norte 2026</p>
          <p>Psicóloga: Magui</p>
        </div>
      </div>
    </header>

    <div id="quiz-box" class="slide-card">

      <div class="progress">
        <div class="bar" id="progress-bar"></div>
      </div>

      <h3 id="question-counter"></h3>
      <h2 id="question"></h2>
      <ul id="options" class="bullets"></ul>

      <button id="next-btn" class="btn">Próxima</button>

    </div>

    <div id="result-box" class="slide-card hidden">
      <h2>🎉 Resultado Final</h2>
      <p class="result-score">
        Você acertou <strong><span id="score"></span></strong> de
        <strong><span id="total"></span></strong> questões
      </p>

      <div class="result-progress">
        <div id="result-bar"></div>
      </div>

      <p id="result-percent"></p>
      <p id="result-message"></p>

      <button id="restart-btn" class="btn secondary">Jogar Novamente</button>
    </div>

  </div>

  <script>
    const questions = [
      {
        question: `01. Lucas é constantemente apelidado pelos colegas devido ao seu peso. Ele já pediu para pararem, mas as piadas continuam todos os dias no recreio. Essa situação caracteriza bullying porque:`,
        options: [
          "É uma brincadeira comum entre adolescentes.",
          "Apresenta repetição, intenção de ferir e desequilíbrio de poder.",
          "Lucas deveria aprender a não ligar para apelidos.",
          "Só seria bullying se houvesse agressão física."
        ],
        answer: 1
      },
      {
        question: `02. Qual é a principal diferença entre o bullying "tradicional" e o cyberbullying?`,
        options: [
          "O cyberbullying é menos grave pois não envolve contato físico.",
          "O bullying acontece apenas na escola, e o cyberbullying apenas em casa.",
          "O cyberbullying permite que a agressão se espalhe rapidamente e alcance a vítima 24h por dia.",
          "Não há diferença; os termos são sinônimos perfeitos."
        ],
        answer: 2
      },
      {
        question: `03. Uma característica marcante do cyberbullying é o "anonimato aparente". Isso significa que:`,
        options: [
          "O agressor nunca pode ser descoberto pela polícia.",
          "O agressor se sente protegido por estar atrás de uma tela, o que pode aumentar a agressividade.",
          "A vítima prefere não saber quem é o agressor.",
          "As redes sociais proíbem o uso de nomes reais."
        ],
        answer: 1
      },
      {
        question: `04. Ao presenciar um colega sendo ridicularizado em um grupo de WhatsApp, a atitude mais ética do espectador seria:`,
        options: [
          "Sair do grupo e fingir que não viu nada.",
          "Rir e enviar emojis para mostrar que é apenas uma brincadeira.",
          "Apoiar a vítima no privado e denunciar o comportamento abusivo aos responsáveis.",
          "Tirar um print e postar em suas próprias redes sociais para expor o agressor."
        ],
        answer: 2
      },
      {
        question: `05. O termo "Exclusão Social" no contexto do bullying refere-se a:`,
        options: [
          "Mudar de escola por vontade própria.",
          "Isolar a vítima propositalmente de atividades em grupo ou círculos de amizade.",
          "Faltar às aulas para estudar em casa.",
          "Não ter internet para acessar as redes sociais."
        ],
        answer: 1
      },
      {
        question: `06. Sobre as consequências psicológicas para quem sofre bullying, é correto afirmar que:`,
        options: [
          "Fortalece a personalidade da vítima para o futuro.",
          "Não causa impactos a longo prazo se a pessoa for \"forte\".",
          "Pode causar ansiedade, depressão, queda no rendimento escolar e isolamento.",
          "Afeta apenas crianças pequenas; adolescentes não sofrem com isso."
        ],
        answer: 2
      },
      {
        question: `07. No Brasil, o bullying é tratado por qual legislação específica?`,
        options: [
          "Lei Maria da Penha.",
          "Lei nº 13.185/2015 (Programa de Combate à Intimidação Sistemática).",
          "Estatuto do Idoso.",
          "Código de Trânsito Brasileiro."
        ],
        answer: 1
      },
      {
        question: `08. O que caracteriza o comportamento do "espectador" no bullying?`,
        options: [
          "É a pessoa que sofre as agressões.",
          "É quem planeja os ataques.",
          "É quem presencia a agressão, podendo apoiar, defender a vítima ou omitir-se.",
          "É o professor que media o conflito."
        ],
        answer: 2
      },
      {
        question: `09. Uma foto comprometedora de uma aluna foi compartilhada sem autorização. Esse ato de cyberbullying pode ser enquadrado como:`,
        options: [
          "Liberdade de expressão.",
          "Crime contra a honra e violação de privacidade.",
          "Apenas um erro de conduta escolar, sem implicações legais.",
          "Direito de quem tirou a foto."
        ],
        answer: 1
      },
      {
        question: `10. O "Grooming" é um perigo digital que muitas vezes começa como cyberbullying. Ele consiste em:`,
        options: [
          "Criar perfis falsos para ganhar seguidores.",
          "A estratégia de um adulto para ganhar a confiança de um menor com fins de abuso.",
          "Postar fotos de animais de estimação.",
          "Jogar games online por muitas horas."
        ],
        answer: 1
      },
      {
        question: `11. Qual destes sentimentos é mais comum no agressor (bully)?`,
        options: [
          "Empatia profunda pelo próximo.",
          "Necessidade de autoafirmação e domínio sobre o outro.",
          "Desejo de ajudar os colegas a melhorarem.",
          "Timidez excessiva em público."
        ],
        answer: 1
      },
      {
        question: `12. O bullying verbal inclui:`,
        options: [
          "Empurrões e chutes.",
          "Roubo de lanches e materiais.",
          "Insultos, apelidos pejorativos e espalhar rumores falsos.",
          "Ignorar a presença da pessoa no ambiente."
        ],
        answer: 2
      },
      {
        question: `13. Por que o cyberbullying pode ser considerado mais "invasivo" que o bullying físico?`,
        options: [
          "Porque as telas de celular emitem luz azul.",
          "Porque a vítima não tem um \"refúgio seguro\", já que as mensagens chegam em qualquer lugar.",
          "Porque é impossível apagar qualquer coisa da internet.",
          "Porque as operadoras de celular cobram caro pelas mensagens."
        ],
        answer: 1
      },
      {
        question: `14. Qual a melhor forma de uma escola prevenir o bullying?`,
        options: [
          "Punir severamente apenas os alunos que reclamam muito.",
          "Ignorar os casos pequenos para não dar importância ao agressor.",
          "Promover a cultura do respeito, empatia e canais de denúncia seguros.",
          "Proibir o uso de qualquer tecnologia dentro da escola."
        ],
        answer: 2
      },
      {
        question: `15. Se você for vítima de cyberbullying, o primeiro passo recomendado é:`,
        options: [
          "Apagar todas as mensagens e fotos imediatamente.",
          "Responder ao agressor com insultos ainda piores.",
          "Salvar as evidências (prints) e buscar ajuda de um adulto de confiança.",
          "Desligar a internet e nunca mais usar redes sociais."
        ],
        answer: 2
      },
      {
        question: `16. O bullying psicológico pode ser identificado por:`,
        options: [
          "Marcas roxas no corpo.",
          "Chantagens, manipulação e ameaças veladas.",
          "Roupa rasgada após o intervalo.",
          "Perda de objetos pessoais."
        ],
        answer: 1
      },
      {
        question: `17. O que é "Flaming" no contexto do cyberbullying?`,
        options: [
          "Enviar mensagens de carinho para amigos.",
          "Troca de insultos hostis em fóruns ou comentários públicos para humilhar alguém.",
          "Postar fotos de paisagens.",
          "Denunciar perfis falsos para a plataforma."
        ],
        answer: 1
      },
      {
        question: `18. Ser empático significa:`,
        options: [
          "Concordar com tudo o que as pessoas dizem.",
          "Tentar compreender e sentir o que o outro sente, colocando-se no lugar dele.",
          "Dar dinheiro para quem precisa.",
          "Ser o aluno mais popular da sala."
        ],
        answer: 1
      },
      {
        question: `19. O "Cyberstalking" refere-se a:`,
        options: [
          "Comprar seguidores em redes sociais.",
          "Perseguição obsessiva e persistente de alguém através da internet.",
          "Postar muitas \"selfies\" no perfil pessoal.",
          "Criar um blog sobre culinária."
        ],
        answer: 1
      },
      {
        question: `20. Qual o papel da família ao descobrir que o filho está praticando bullying?`,
        options: [
          "Negar o fato, pois \"seu filho não faria isso\".",
          "Incentivar o comportamento para que ele seja um \"líder\".",
          "Dialogar, entender os motivos e responsabilizá-lo, buscando ajuda se necessário.",
          "Retirar o filho da escola imediatamente sem conversar."
        ],
        answer: 2
      },
      {
        question: `21. João sempre chama um colega por apelidos ofensivos na frente da turma. Essa situação é:`,
        options: [
          "Brincadeira saudável",
          "Bullying",
          "Amizade",
          "Ajuda"
        ],
        answer: 1
      },
      {
        question: `22. Uma aluna cria um perfil falso para zombar de outra pessoa na internet. Isso é:`,
        options: [
          "Brincadeira",
          "Cyberbullying",
          "Comunicação",
          "Respeito"
        ],
        answer: 1
      },
      {
        question: `23. Quando uma pessoa sofre bullying, ela pode sentir:`,
        options: [
          "Alegria",
          "Indiferença",
          "Tristeza e medo",
          "Diversão"
        ],
        answer: 2
      },
      {
        question: `24. Um grupo exclui propositalmente um colega das atividades. Isso é:`,
        options: [
          "Organização",
          "Bullying",
          "Liderança",
          "Disciplina"
        ],
        answer: 1
      },
      {
        question: `25. Compartilhar fotos de alguém sem permissão para ridicularizar é:`,
        options: [
          "Legal",
          "Cyberbullying",
          "Amizade",
          "Ajuda"
        ],
        answer: 1
      },
      {
        question: `26. O bullying geralmente acontece:`,
        options: [
          "Uma única vez",
          "De forma repetitiva",
          "Sem intenção",
          "Por acidente"
        ],
        answer: 1
      },
      {
        question: `27. Quando alguém presencia bullying, deve:`,
        options: [
          "Ignorar",
          "Incentivar",
          "Ajudar ou comunicar a um adulto",
          "Rir junto"
        ],
        answer: 2
      },
      {
        question: `28. Enviar mensagens ofensivas por celular é exemplo de:`,
        options: [
          "Educação",
          "Cyberbullying",
          "Comunicação normal",
          "Ajuda"
        ],
        answer: 1
      },
      {
        question: `29. O respeito entre colegas ajuda a:`,
        options: [
          "Aumentar conflitos",
          "Evitar bullying",
          "Criar problemas",
          "Separar pessoas"
        ],
        answer: 1
      },
      {
        question: `30. Fazer ameaças a um colega caracteriza:`,
        options: [
          "Brincadeira",
          "Violência/Bullying",
          "Amizade",
          "Educação"
        ],
        answer: 1
      },
      {
        question: `31. Um aluno espalha boatos sobre outro na escola. Isso é:`,
        options: [
          "Informação",
          "Bullying",
          "Comunicação",
          "Ajuda"
        ],
        answer: 1
      },
      {
        question: `32. Criar memes ofensivos sobre alguém na internet é:`,
        options: [
          "Humor saudável",
          "Cyberbullying",
          "Criatividade",
          "Informação"
        ],
        answer: 1
      },
      {
        question: `33. A vítima de bullying deve:`,
        options: [
          "Ficar calada",
          "Procurar ajuda",
          "Revidar com violência",
          "Ignorar sempre"
        ],
        answer: 1
      },
      {
        question: `34. O bullying pode causar:`,
        options: [
          "Apenas risadas",
          "Problemas emocionais",
          "Apenas diversão",
          "Nenhum efeito"
        ],
        answer: 1
      },
      {
        question: `35. Respeitar as diferenças significa:`,
        options: [
          "Julgar os outros",
          "Aceitar e conviver bem",
          "Excluir pessoas",
          "Criticar sempre"
        ],
        answer: 1
      },
      {
        question: `36. Enviar mensagens repetidas humilhando alguém é:`,
        options: [
          "Amizade",
          "Cyberbullying",
          "Comunicação",
          "Ajuda"
        ],
        answer: 1
      },
      {
        question: `37. Um ambiente escolar saudável é aquele onde:`,
        options: [
          "Há respeito",
          "Há brigas",
          "Há exclusão",
          "Há medo"
        ],
        answer: 0
      },
      {
        question: `38. Filmar agressões e divulgar na internet é:`,
        options: [
          "Diversão",
          "Cyberbullying",
          "Informação",
          "Ajuda"
        ],
        answer: 1
      },
      {
        question: `39. Denunciar casos de bullying é importante porque:`,
        options: [
          "Piora a situação",
          "Ajuda a resolver o problema",
          "Não muda nada",
          "Cria mais conflitos"
        ],
        answer: 1
      },
      {
        question: `40. O bullying e o cyberbullying devem ser:`,
        options: [
          "Incentivados",
          "Ignorados",
          "Combatidos",
          "Aceitos"
        ],
        answer: 2
      }
    ];

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const nextBtn = document.getElementById("next-btn");
    const progressBar = document.getElementById("progress-bar");

    const quizBox = document.getElementById("quiz-box");
    const resultBox = document.getElementById("result-box");

    const scoreEl = document.getElementById("score");
    const totalEl = document.getElementById("total");

    const restartBtn = document.getElementById("restart-btn");
    const questionCounterEl = document.getElementById("question-counter");

    let currentQuestion = 0;
    let score = 0;

    totalEl.textContent = questions.length;

    function loadQuestion() {
      const q = questions[currentQuestion];
      questionEl.textContent = q.question;
      optionsEl.innerHTML = "";

      q.options.forEach((opt, i) => {
        const li = document.createElement("li");
        li.textContent = opt;
        li.classList.add("option");
        li.addEventListener("click", () => selectOption(i));
        optionsEl.appendChild(li);
      });

      nextBtn.style.display = "none";
      updateProgress();
      questionCounterEl.textContent = `Questão ${currentQuestion + 1} de ${questions.length}`;
    }

    function selectOption(index) {
      const q = questions[currentQuestion];
      const allOptions = document.querySelectorAll(".option");

      allOptions.forEach((opt, i) => {
        if (i === q.answer) opt.classList.add("correct");
        if (i === index && i !== q.answer) opt.classList.add("wrong");
        opt.style.pointerEvents = "none";
      });

      if (index === q.answer) score++;
      nextBtn.style.display = "block";
    }

    nextBtn.addEventListener("click", () => {
      currentQuestion++;
      if (currentQuestion < questions.length) loadQuestion();
      else showResult();
    });

    function updateProgress() {
      const pct = ((currentQuestion) / questions.length) * 100;
      progressBar.style.width = pct + "%";
    }

    function showResult() {
      quizBox.classList.add("hidden");
      resultBox.classList.remove("hidden");

      scoreEl.textContent = score;
      const percent = Math.round((score / questions.length) * 100);

      const resultBar = document.getElementById("result-bar");
      const resultPercent = document.getElementById("result-percent");
      const resultMessage = document.getElementById("result-message");

      resultBar.style.width = percent + "%";
      resultPercent.textContent = percent + "% de aproveitamento";

      let msg = percent >= 70 ? "👏 Muito bom!" : "📚 Revise o conteúdo.";
      resultMessage.textContent = msg;
    }

    restartBtn.addEventListener("click", () => {
      score = 0;
      currentQuestion = 0;
      resultBox.classList.add("hidden");
      quizBox.classList.remove("hidden");
      loadQuestion();
    });

    loadQuestion();
  </script>
</body>

</html>
